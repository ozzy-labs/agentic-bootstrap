# aqua レジストリ経由のツールは、上流リリースとレジストリ追従のずれにより
# 任意の新バージョンが破綻し得るため、すべて具体パッチ版に明示ピンする。
# 更新は Renovate (mise manager) が自動 PR 化し、CI で検証する。
# core バックエンド（node）は対象外。
[tools]
# Runtime & package managers
node = "24"
pnpm = "10.33.2"

# Linters & formatters
biome = "2.4.14"
taplo = "0.10.0"
shellcheck = "0.11.0"
shfmt = "3.13.1"
bats = "1.13.0"
chezmoi = "2.70.2"
"npm:markdownlint-cli2" = "0.22.1"
"pipx:yamllint" = "1.38.0"
yamlfmt = "0.21.0"
actionlint = "1.7.12"
gitleaks = "8.30.1"
"pipx:mdformat" = "0.7.22"
# trivy は aqua レジストリの signer_workflow が aquasecurity/trivy の Immutable
# Release 移行に追従していないため、github バックエンドに切替えて回避する。
# lefthook の pre-commit フックが `mise exec -- trivy ...` を呼ぶため、
# 新規 clone した contributor の最初のコミットがフックで失敗しないよう
# リポルートの .mise.toml にも明示する（dotfiles テンプレートと同期）。
"github:aquasecurity/trivy" = "0.70.0"

# Git hooks & commit conventions
lefthook = "2.1.6"
"npm:@commitlint/cli" = "20.5.3"
"npm:@commitlint/config-conventional" = "20.5.3"
